<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Buttons</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">

    <!-- Button 1 -->
    <button id="button-1" class="btn btn-primary">
        Primary
    </button>

    <!-- Button 2 -->
    <button id="button-2" class="btn btn-outline-secondary">
        Secondary
    </button>

    <!-- Button 3 -->
    <button id="button-3" class="btn btn-success btn-lg">
        Success
    </button>

    <!-- Button 4 -->
    <button id="button-4" class="btn btn-danger btn-sm">
        Danger
    </button>

    <!-- Button 5 -->
    <button id="button-5" class="btn btn-warning btn-lg w-100 mt-2">
        Warning
    </button>

    <!-- Button 6 -->
    <button id="button-6" class="btn btn-info" disabled>
        Info
    </button>

    <!-- Button 7 -->
    <button id="button-7" class="btn btn-light">
        Light
    </button>

    <!-- Button 8 -->
    <button id="button-8" class="btn btn-link">
        Link
    </button>

</div>

</body>
</html>
